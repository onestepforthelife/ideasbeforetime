<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=https://ideasbeforetime.pages.dev/request-access.html">
    <link rel="canonical" href="https://ideasbeforetime.pages.dev/request-access.html">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            text-align: center;
        }
        .redirect-message {
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="common-navigation.js"></script>
<script src="universal-analytics.js"></script>
</head>
<body>
    <div class="redirect-message">
        <h2>Redirecting...</h2>
        <div class="spinner"></div>
    </div>
    <script>
        window.location.href = 'https://ideasbeforetime.pages.dev/request-access.html';
    </script>
    <script src="common-footer.js"></script>
    <script src="error-tracker.js"></script>
</body>
</html>
